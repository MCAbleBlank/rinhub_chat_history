<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聊天记录</title>
    <!-- CSS 变量系统 (必须首先加载) -->
    <link rel="stylesheet" href="styles/variables.css">
    <!-- 基础样式 -->
    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="styles/layout.css">
    <!-- 组件样式 -->
    <link rel="stylesheet" href="styles/components.css">
    <link rel="stylesheet" href="styles/messages.css">
    <!-- 功能模块 -->
    <link rel="stylesheet" href="styles/image-viewer.css">
    <link rel="stylesheet" href="styles/screenshot.css">
    <link rel="stylesheet" href="styles/settings.css">
    <link rel="stylesheet" href="styles/editor.css">
</head>

<body>
    <div class="chat-container">
        <div class="chat-header">
            <div class="menu-icon" id="menuIcon">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <h2>(∪.∪ )...zzz</h2>
            <div class="chat-info"></div>
            <div class="identity-selector">
                <div id="identitySelect" class="identity-select">
                    <span class="selected-text">选择用户</span>
                    <div class="dropdown-options">
                        <!-- 选项将由 JavaScript 动态添加 -->
                    </div>
                </div>
            </div>
        </div>
        <div class="side-menu" id="sideMenu">
            <!-- 本地功能区 -->
            <div class="local-actions-container"
                style="padding: 15px 20px 0 20px; display: flex; flex-direction: column; gap: 10px;">
                <button class="settings-btn" id="btnPreviewZip">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                        <polyline points="17 8 12 3 7 8" />
                        <line x1="12" y1="3" x2="12" y2="15" />
                    </svg>
                    预览本地 ZIP
                </button>
                <button class="settings-btn" id="btnOpenEditor">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
                        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
                    </svg>
                    新建编辑器
                </button>
                <button class="settings-btn" id="btnEditCurrent" style="display: none;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
                        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
                    </svg>
                    编辑当前记录
                </button>
                <input type="file" id="localZipLoader" accept=".zip" style="display: none;">
            </div>

            <div class="menu-content">
                <!-- 菜单内容将由 JavaScript 动态添加 -->
            </div>
        </div>
        <div class="chat-messages" id="chatMessages">
        </div>

        <!-- 编辑器视图将在这里挂载 -->
        <div class="editor-container" id="editorContainer" style="display: none;"></div>
    </div>

    <!-- 添加图片查看器 -->
    <div id="imageViewer" class="image-viewer">
        <div class="viewer-toolbar">
            <button id="zoomIn" class="zoom-button">+</button>
            <span id="scaleText">100%</span>
            <button id="zoomOut" class="zoom-button">-</button>
            <button id="closeViewer" class="close-button">×</button>
        </div>
        <img id="viewerImage" class="viewer-image" alt="预览图片">
    </div>

    <script src="script/lib/jszip.min.js"></script>
    <script src="script/lib/FileSaver.min.js"></script>
    <script src="script/main.js"></script>
    <script src="script/local-preview.js"></script>
    <script src="script/editor.js"></script>
    <script src="script/image-viewer.js"></script>
    <script src="script/screenshot.js"></script>
    <script src="script/settings.js"></script>
</body>

</html>
